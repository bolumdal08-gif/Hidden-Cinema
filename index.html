<!DOCTYPE html>
<html lang="ko">
<head>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Cinema</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<section class="search-section">

<h2>취향 설문</h2>

<select id="mood">
<option value="">원하는 분위기</option>
<option>감동</option>
<option>청춘</option>
<option>성장</option>
<option>가족</option>
<option>우정</option>
<option>사회</option>
<option>힐링</option>
<option>긴장감</option>
</select>

<select id="genre">
<option value="">장르 선택</option>
</select>

<select id="runtime">
<option value="">상영시간</option>
<option value="short">60분 이하</option>
<option value="middle">60~120분</option>
<option value="long">120분 이상</option>
</select>

<button onclick="recommendMovie()">
추천 받기
</button>

</section>
<section id="results"></section>

<script src="script.js"></script>

</body>
</html>
<section class="about">
<h2>프로젝트 소개</h2>

<p>
Hidden Cinema는 사용자의 취향에 맞는 영화를 추천하여
다양한 한국 영화의 소비를 촉진하고,
영화산업 활성화에 기여하기 위해 제작된
개인 맞춤형 영화 추천 플랫폼입니다.
</p>

</section>
